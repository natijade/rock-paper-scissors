<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
<script src="script.js" defer></script>
<link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="content">
        <div class="buttons"> 
                <button id = "rockButton" class="button"><img src="rock.png">Rock</button> 
                <button id = "paperButton" class="button"><img src="paper.png">Paper</button> 
                <button id = "scissorsButton" class="button"><img src="scissors.png">Scissors</button> 
        </div>
    <h1 class="round-winner" id="result">The Winner Is...</h1>
    <div class = "content"></div>
        <div class="score-container">
        <h2>Score</h2> 
            <div class="score-board">
            <div class="score-box">Player: <div class="score" id = "playerscore">0</div> </div>
            <div class = "score-box">Computer: <div class="score" id = "computerscore">0</div> </div>
            </div>
        </div>
    </div>
    </div>
</body>
</html>
